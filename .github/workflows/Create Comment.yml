name: Create Comment

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  create-comment:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'need info'
    steps:
      - name: Create comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --repo "$GH_REPO" --body "你好 ${ISSUE_AUTHOR}。由于您的 Issue 缺少必要的信息。请按照 Issue 模板在评论中提供更多信息，以便我们更好地帮助您。谢谢！

          Hello ${ISSUE_AUTHOR}. Due to the lack of necessary information in your issue. Please provide more information in the comments according to the Issue template so that we can better assist you. Thank you!"
